# AI量化Agent - Docker Compose配置
# 一键部署到云服务器

version: '3.8'

services:
  ai-trading-agent:
    build: .
    container_name: ai-trading-agent
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - TZ=Asia/Shanghai
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - SECRET_KEY=${SECRET_KEY:-ai-trading-agent-secret}
    volumes:
      # 持久化日志
      - ./logs:/app/logs
      # 可选：挂载配置文件
      - ./.env:/app/.env:ro
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx反向代理（可选，用于HTTPS和域名）
  nginx:
    image: nginx:alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-trading-agent
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
